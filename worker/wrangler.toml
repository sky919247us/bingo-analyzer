name = "bingo-kv-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV Namespace 綁定（部署前需先建立並替換 id）
[[kv_namespaces]]
binding = "BINGO_KV"
id = "70a64942296646beb26ecd8aea27597c"

# Cron Trigger（每日 203 期，台灣時間 07:05~23:55 每 5 分鐘開獎）：
# 1. 主排程：台灣 07:00~23:55 = UTC 23:00~15:55，每 5 分鐘觸發
#    程式內延遲 5 秒再抓取，確保台彩 API 已更新（模擬 :05:05, :10:05, ... 的提取時間）
# 2. 換日排程：台灣凌晨 04:05 = UTC 20:05，清空前日資料
[triggers]
crons = ["*/5 0-15,23 * * *", "5 20 * * *"]
